# SDK \u914D\u7F6E\u6837\u4F8B\u3002\u590D\u5236\u4E3A\u5546\u6237\u670D\u52A1\u7AEF classpath \u4E0B\u7684 merchant-config.properties \u540E\u518D\u586B\u5199\u771F\u5B9E\u503C\u3002
# \u672C\u6587\u4EF6\u53EA\u4FDD\u7559\u5360\u4F4D\u7B26\uFF0C\u907F\u514D\u6D4B\u8BD5\u5BC6\u94A5\u6216\u751F\u4EA7\u5BC6\u94A5\u88AB\u6253\u5165 SDK \u53D1\u5E03\u5305\u3002

# \u5E73\u53F0\u5546\u6237\u53F7\u3002SDK \u4F1A\u5199\u5165 JWT merchantId claim\uFF0C\u5E76\u5728\u8BF7\u6C42\u53C2\u6570\u4E2D\u6821\u9A8C\u5546\u6237\u53F7\u4E00\u81F4\u6027\u3002
merchant.id=<merchant-id>

# \u5546\u6237 API \u79C1\u94A5\u3002\u65B0\u534F\u8BAE\u7528\u4F5C Bearer JWT HS256 \u7B7E\u540D\u5BC6\u94A5\uFF0C\u5386\u53F2\u63A5\u53E3\u7528\u4F5C Payment \u9274\u6743 token\u3002
merchant.api.private-key=<merchant-api-private-key>

# \u5E73\u53F0\u8BF7\u6C42\u516C\u94A5 PEM \u6587\u4EF6\u3002\u63A8\u8350\u4F7F\u7528\u5E73\u53F0\u5BFC\u51FA\u7684 keys/platform-request-public-key.pem\u3002
merchant.platform.public-key-file=classpath:keys/platform-request-public-key.pem

# \u5546\u6237\u54CD\u5E94\u79C1\u94A5 PEM \u6587\u4EF6\u3002\u751F\u4EA7\u73AF\u5883\u4E5F\u53EF\u4EE5\u5199 file:/etc/payment-gateway/keys/merchant-response-private-key.pem\u3002
merchant.response.private-key-file=classpath:keys/merchant-response-private-key.pem

# \u6587\u672C\u6A21\u5F0F\u517C\u5BB9\u65E7\u914D\u7F6E\uFF1B\u5982\u679C\u540C\u65F6\u914D\u7F6E xxx-file \u548C xxx\uFF0CSDK \u4F18\u5148\u8BFB\u53D6 xxx-file\u3002
# merchant.platform.public-key=<platform-request-public-key-x509-base64>
# merchant.response.private-key=<merchant-response-private-key-pkcs8-base64>

# Payment Gateway \u7F51\u5173\u57FA\u7840\u5730\u5740\u3002SDK \u4F1A\u5728\u8BE5\u5730\u5740\u540E\u62FC\u63A5 /pay-api/** \u8DEF\u5F84\u3002
merchant.openapi.base-url=https://payment-gateway.example.com
