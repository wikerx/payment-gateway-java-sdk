# 测试用 SDK 默认商户配置。
# 单元测试通过该文件验证配置加载、JWT 签名、请求加密和响应解密链路。
# 这里的密钥只服务本地测试，不能作为生产配置样例直接复制使用。

# 测试商户号。测试断言会校验它被写入 JWT merchantId claim。
merchant.id=200046

# 测试商户 JWT HS256 签名密钥，用于 MerchantJwtSignerTest 和端到端客户端测试。
merchant.jwt.secret=sdk-test-jwt-secret-change-me-32-bytes-only

# 测试平台请求公钥。客户端用它加密请求，测试传输层用 payment-gateway-test-key-material.properties 中对应私钥解密。
merchant.platform.public-

# 测试商户响应私钥。客户端用它解密测试传输层模拟平台返回的加密 data。
merchant.response.private-

# 测试 Payment Gateway 基础地址。测试传输层只断言 URI 路径，不会真实访问该域名。
merchant.openapi.base-url=https://payment-gateway.example.com
